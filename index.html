<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𝐴𝐵𝐵𝐴𝑆 | ŞZS - </title>
    <style>
        /* إعدادات الصفحة الأساسية - منع السكرول */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #000814;
            display: flex; justify-content: center; align-items: center;
            direction: rtl; /* اتجاه الكتابة عربي */
        }

        /* الخلفية المائية المتحركة */
        body::before {
            content: "";
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #001219, #003049, #001d3d, #005f73);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            z-index: -2;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* تأثير الثلج الصاعد */
        .snow-container {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; z-index: -1; pointer-events: none;
        }
        .snow {
            position: absolute; bottom: -20px;
            background: rgba(255, 255, 255, 0.4); border-radius: 50%;
            animation: rise 6s linear infinite;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
        }

        /* الاسم فوق في النص */
        .rights {
            position: absolute; top: 25px; 
            font-size: 22px; font-weight: bold; 
            color: #00b4d8; text-shadow: 0 0 15px #00b4d8;
            z-index: 100;
        }

        /* الكرت الرئيسي (التصميم الزجاجي) */
        .hub-card {
            background: rgba(0, 15, 25, 0.8);
            backdrop-filter: blur(25px);
            border: 2px solid rgba(0, 180, 216, 0.5);
            border-radius: 30px;
            padding: 35px;
            width: 85%; max-width: 400px;
            box-shadow: 0 0 40px rgba(0, 180, 216, 0.3);
            z-index: 10;
            text-align: center;
        }

        h1 { font-size: 22px; margin-bottom: 10px; color: #fff; }
        p { font-size: 15px; color: #caf0f8; margin-bottom: 30px; opacity: 0.9; }

        /* الأزرار الموحدة الفخمة */
        .btn {
            display: block; padding: 15px; margin: 15px 0;
            font-size: 17px; font-weight: bold; color: #fff;
            text-decoration: none; border-radius: 15px;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid #00b4d8;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: glow-pulse 3s infinite ease-in-out;
        }

        .btn:hover {
            background: rgba(0, 180, 216, 0.2);
            transform: scale(1.04);
            border-color: #00f5d4;
        }

        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 0 5px rgba(0, 180, 216, 0.2); }
            50% { box-shadow: 0 0 20px rgba(0, 180, 216, 0.5); }
        }

        .label { font-size: 12px; margin-top: 25px; opacity: 0.6; color: #00b4d8; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="snow-container" id="snowBox"></div>

    <div class="rights">𝐴𝐵𝐵𝐴𝑆 | ŞZS</div>

    <div class="hub-card">
        <h1>موقع التسريبات والهدايا</h1>
        <p>افضل موقغ من مطور عربي😮‍💨🔥</p>
        
        <a href="javascript:void(0)" class="btn" onclick="playEffect('https://link.brawlstars.com/voucher/e0793a51-1bc1-44ce-a7e0-1d72cef91b6d')">
           الحصول على صندوق ناجية
        </a>

        <div class="label">حسابات التواصل الاجتماعي للمطور:</div>
        
        <a href="javascript:void(0)" class="btn" onclick="playEffect('https://www.tiktok.com/@sz2st?_r=1&_t=ZS-952okvechm5')">
           حساب المطور على تيك توك
        </a>

        <a href="javascript:void(0)" class="btn" onclick="playEffect('https://t.me/DEVSZ_STORE')">
           حساب المطور على تيليجرام
        </a>
    </div>

    <audio id="audioClick" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        // كود الثلج الصاعد
        const snowBox = document.getElementById('snowBox');
        for (let i = 0; i < 30; i++) {
            let snow = document.createElement('div');
            snow.className = 'snow';
            let size = Math.random() * 4 + 2 + 'px';
            snow.style.width = size;
            snow.style.height = size;
            snow.style.left = Math.random() * 100 + '%';
            snow.style.animationDelay = Math.random() * 5 + 's';
            snowBox.appendChild(snow);
        }

        function playEffect(url) {
            var sound = document.getElementById("audioClick");
            sound.currentTime = 0;
            sound.play();
            setTimeout(() => { window.location.href = url; }, 400);
        }
    </script>
</body>
</html>
