<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𝐴𝐵𝐵𝐴𝑆 | ŞZS - HUB</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #000814;
            display: flex; justify-content: center; align-items: center;
            direction: rtl;
        }

        /* الخلفية المائية */
        body::before {
            content: "";
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #001219, #003049, #001d3d, #005f73);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            z-index: -2;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* الثلج الصاعد */
        .snow-container {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; z-index: -1; pointer-events: none;
        }
        .snow {
            position: absolute; bottom: -20px;
            background: rgba(255, 255, 255, 0.4); border-radius: 50%;
            animation: rise 6s linear infinite;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
        }

        .rights {
            position: absolute; top: 25px; 
            font-size: 22px; font-weight: bold; 
            color: #00b4d8; text-shadow: 0 0 15px #00b4d8;
            z-index: 100;
        }

        /* تصميم الكرت (Hub Card) */
        .hub-card {
            background: rgba(0, 15, 25, 0.8);
            backdrop-filter: blur(25px);
            border: 2px solid rgba(0, 180, 216, 0.5);
            border-radius: 30px;
            padding: 30px;
            width: 85%; max-width: 400px;
            box-shadow: 0 0 40px rgba(0, 180, 216, 0.3);
            z-index: 10;
            text-align: center;
            display: none; /* مخفي افتراضياً ويظهر بالجافا سكربت */
        }

        .active-page { display: block !important; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        h1 { font-size: 20px; margin-bottom: 5px; color: #fff; }
        p { font-size: 14px; color: #caf0f8; margin-bottom: 25px; opacity: 0.8; }

        .btn {
            display: block; padding: 14px; margin: 12px 0;
            font-size: 16px; font-weight: bold; color: #fff;
            text-decoration: none; border-radius: 15px;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid #00b4d8;
            transition: 0.3s;
        }

        .btn:hover { background: rgba(0, 180, 216, 0.2); transform: scale(1.02); }

        /* شريط التنقل السفلي */
        .nav-bar {
            position: absolute; bottom: 20px;
            width: 90%; max-width: 380px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            display: flex; justify-content: space-around;
            padding: 10px; border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .nav-item {
            color: #888; text-decoration: none; font-size: 14px; font-weight: bold;
            padding: 10px 20px; border-radius: 30px; transition: 0.3s;
            cursor: pointer;
        }

        .nav-item.active {
            color: #00b4d8; background: rgba(0, 180, 216, 0.15);
            box-shadow: 0 0 15px rgba(0, 180, 216, 0.3);
        }

        /* تنسيق صفحة الصيانة */
        .maintenance-text {
            color: #ff4d4d; font-size: 26px; font-weight: bold;
            margin: 40px 0; text-shadow: 0 0 15px #ff4d4d;
            animation: blinker 1.5s linear infinite;
        }

        @keyframes blinker { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="snow-container" id="snowBox"></div>

    <div class="rights">𝐴𝐵𝐵𝐴𝑆 | ŞZS</div>

    <div id="pageHome" class="hub-card active-page">
        <h1>موقع التسريبات والهدايا</h1>
        <p>افضل موقع من مطور عربي</p>
        
        <a href="javascript:void(0)" class="btn" onclick="playAndGo('https://link.brawlstars.com/voucher/e0793a51-1bc1-44ce-a7e0-1d72cef91b6d')">
           الحصول على صندوق ناجية
        </a>

        <div style="font-size: 12px; margin: 20px 0 5px; color: #00b4d8; opacity: 0.6;">حسابات التواصل للمطور:</div>
        
        <a href="javascript:void(0)" class="btn" onclick="playAndGo('https://www.tiktok.com/@sz2st?_r=1&_t=ZS-952okvechm5')">
           حساب المطور على تيك توك
        </a>

        <a href="javascript:void(0)" class="btn" onclick="playAndGo('https://t.me/DEVSZ_STORE')">
           حساب المطور على تيليجرام
        </a>
    </div>

    <div id="pageLeaks" class="hub-card">
        <h1>قائمة التسريبات..</h1>
        <div class="maintenance-text">تحت الصيانة!</div>
        <p>يرجى العودة لاحقاً لمشاهدة آخر التسريبات</p>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="btnHomeNav" onclick="switchPage('home')">القائمة الرئيسية</div>
        <div class="nav-item" id="btnLeaksNav" onclick="switchPage('leaks')">التسريبات</div>
    </div>

    <audio id="clickSound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        // تأثير الثلج
        const snowBox = document.getElementById('snowBox');
        for (let i = 0; i < 30; i++) {
            let snow = document.createElement('div');
            snow.className = 'snow';
            let size = Math.random() * 4 + 2 + 'px';
            snow.style.width = size;
            snow.style.height = size;
            snow.style.left = Math.random() * 100 + '%';
            snow.style.animationDelay = Math.random() * 5 + 's';
            snowBox.appendChild(snow);
        }

        const snd = document.getElementById("clickSound");

        function playAndGo(url) {
            snd.currentTime = 0; snd.play();
            setTimeout(() => { window.location.href = url; }, 400);
        }

        function switchPage(page) {
            snd.currentTime = 0; snd.play(); // تشغيل الصوت عند الضغط على أزرار القائمة

            if (page === 'home') {
                document.getElementById('pageHome').classList.add('active-page');
                document.getElementById('pageLeaks').classList.remove('active-page');
                document.getElementById('btnHomeNav').classList.add('active');
                document.getElementById('btnLeaksNav').classList.remove('active');
            } else {
                document.getElementById('pageLeaks').classList.add('active-page');
                document.getElementById('pageHome').classList.remove('active-page');
                document.getElementById('btnLeaksNav').classList.add('active');
                document.getElementById('btnHomeNav').classList.remove('active');
            }
        }
    </script>
</body>
</html>
