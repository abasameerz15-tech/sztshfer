<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة التشفير رقم 1# بالعالم | VM 6-Layer Encryption</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', Geneva, sans-serif;
            background: #000011;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            background-image: radial-gradient(circle at 20% 30%, #0a0f30 0%, #000000 80%);
        }

        .container {
            position: relative;
            z-index: 2;
            width: 92%;
            max-width: 900px;
            background: rgba(0, 10, 30, 0.75);
            backdrop-filter: blur(35px);
            border-radius: 38px;
            padding: 45px 30px;
            box-shadow: 0 30px 70px rgba(0, 170, 255, 0.4), 0 0 0 2px rgba(0, 255, 200, 0.5);
            animation: borderPulse 3s infinite alternate;
        }

        @keyframes borderPulse {
            0% { box-shadow: 0 30px 70px rgba(0, 180, 255, 0.4), 0 0 0 2px #00ffcc; }
            100% { box-shadow: 0 40px 80px rgba(200, 0, 255, 0.5), 0 0 0 3px #ff00ff; }
        }

        h1 {
            text-align: center;
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffbb00, #ff4d00, #ffbb00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 35px #ff8800);
            margin-bottom: 20px;
        }

        .subtitle {
            color: #b0f0ff;
            text-align: center;
            font-size: 1.4rem;
            margin-bottom: 35px;
            text-shadow: 0 0 20px #00ffff;
            letter-spacing: 2px;
        }

        .upload-box {
            background: rgba(255, 255, 255, 0.03);
            border: 2px dashed #00ffcc;
            border-radius: 28px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.4s;
        }

        .upload-box:hover {
            border-color: #ffaa00;
            background: rgba(255, 170, 0, 0.08);
            box-shadow: 0 0 40px #ffaa00;
        }

        .file-label {
            background: linear-gradient(45deg, #000c1a, #001a33);
            color: #ffcc00;
            padding: 18px 50px;
            border-radius: 60px;
            font-size: 1.6rem;
            font-weight: bold;
            border: 2px solid #ff9900;
            box-shadow: 0 0 30px #ff8800;
            cursor: pointer;
            transition: 0.3s;
            display: inline-block;
        }

        .file-label:hover {
            box-shadow: 0 0 55px #ffaa00;
            transform: scale(1.04);
        }

        #fileInput {
            display: none;
        }

        .file-name {
            color: #aaffdd;
            margin-top: 18px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .btn-gang {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .btn {
            background: #001a1a;
            color: #00ff99;
            border: 2px solid #00ff99;
            padding: 15px 45px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 45px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px #00ff88;
            letter-spacing: 2px;
            backdrop-filter: blur(10px);
        }

        .btn:hover:not(:disabled) {
            background: #00ff88;
            color: #000;
            box-shadow: 0 0 45px #00ff88;
            border-color: #ffffff;
        }

        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            box-shadow: none;
        }

        .output-panel {
            margin-top: 25px;
            background: #010a14;
            border: 1px solid #00ffcc;
            border-radius: 24px;
            padding: 15px;
        }

        textarea {
            width: 100%;
            height: 280px;
            background: #000000;
            color: #00eeff;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            padding: 18px;
            border: none;
            border-radius: 16px;
            outline: none;
            resize: vertical;
            box-shadow: inset 0 0 25px rgba(0, 255, 200, 0.2);
        }

        .download-btn {
            background: #ff7700;
            color: #000;
            border: none;
            box-shadow: 0 0 35px #ff7700;
            margin-top: 18px;
            width: 100%;
            text-align: center;
        }

        .download-btn:hover:not(:disabled) {
            background: #ffaa00;
            box-shadow: 0 0 55px #ffaa00;
        }

        .status-text {
            text-align: center;
            color: #ffcc44;
            font-weight: bold;
            margin: 10px 0;
            min-height: 28px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ مرحباً بك في أداة التشفير رقم 1# بالعالم ✨</h1>
        <div class="subtitle">🛡️ تشفير VM الأسطوري × 6 طبقات – لا فك ولا هندسة عكسية 🛡️</div>

        <div class="upload-box" id="uploadBox">
            <label for="fileInput" class="file-label">📂 رفع ملف Lua</label>
            <input type="file" id="fileInput" accept=".lua,.txt">
            <div class="file-name" id="fileDisplay"></div>
        </div>

        <div class="btn-gang">
            <button class="btn" id="encryptBtn" disabled>🔐 تشفير 6X</button>
        </div>

        <div class="status-text" id="statusMsg"></div>

        <div class="output-panel" id="outputPanel" style="display: none;">
            <textarea id="encryptedCode" readonly dir="ltr"></textarea>
            <button class="btn download-btn" id="downloadBtn" disabled>⬇️ تحميل الملف المشفر</button>
        </div>
    </div>

    <script>
        (function() {
            const fileInput = document.getElementById('fileInput');
            const fileDisplay = document.getElementById('fileDisplay');
            const encryptBtn = document.getElementById('encryptBtn');
            const statusMsg = document.getElementById('statusMsg');
            const outputPanel = document.getElementById('outputPanel');
            const encryptedCodeArea = document.getElementById('encryptedCode');
            const downloadBtn = document.getElementById('downloadBtn');
            const uploadBox = document.getElementById('uploadBox');

            let selectedFile = null;

            uploadBox.addEventListener('click', (e) => {
                if (e.target !== fileInput) fileInput.click();
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    selectedFile = e.target.files[0];
                    fileDisplay.textContent = '📄 ' + selectedFile.name;
                    encryptBtn.disabled = false;
                    statusMsg.textContent = '';
                    outputPanel.style.display = 'none';
                    downloadBtn.disabled = true;
                } else {
                    selectedFile = null;
                    fileDisplay.textContent = '';
                    encryptBtn.disabled = true;
                }
            });

            // ============= دوال التشفير المساعدة =============
            function hashString(str) {
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    const ch = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + ch;
                    hash |= 0;
                }
                return Math.abs(hash);
            }

            function generateKeystream(seed, length) {
                let s = seed % 2147483647;
                const stream = [];
                for (let i = 0; i < length; i++) {
                    s = (s * 1103515245 + 12345) & 0x7fffffff;
                    stream.push(s & 0xff);
                }
                return stream;
            }

            function xorBytes(bytes, keystream) {
                return bytes.map((b, i) => b ^ keystream[i]);
            }

            function base64Encode(bytes) {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
                let result = '';
                for (let i = 0; i < bytes.length; i += 3) {
                    const b1 = bytes[i];
                    const b2 = i + 1 < bytes.length ? bytes[i + 1] : 0;
                    const b3 = i + 2 < bytes.length ? bytes[i + 2] : 0;
                    result += chars.charAt(b1 >> 2);
                    result += chars.charAt(((b1 & 3) << 4) | (b2 >> 4));
                    result += i + 1 < bytes.length ? chars.charAt(((b2 & 15) << 2) | (b3 >> 6)) : '=';
                    result += i + 2 < bytes.length ? chars.charAt(b3 & 63) : '=';
                }
                return result;
            }

            function buildVMBytecode(source) {
                const bc = [];
                for (let i = 0; i < source.length; i++) {
                    bc.push(1, source.charCodeAt(i)); // PUSH_CHAR
                }
                bc.push(2, 0); // CONCAT
                bc.push(3, 0); // EXEC
                // إضافة تعليمات وهمية للتضليل
                bc.push(99, 0); bc.push(99, 1); bc.push(99, 2);
                return bc;
            }

            function generateObfuscatedLoader(encryptedFinal, seeds, checksum) {
                // أسماء متغيرات مشوشة
                const varNames = [
                    'ﺂﻠﻤﻧ' + String.fromCharCode(0x0643) + 'ء',
                    'ﻊﻤﻠ' + String.fromCharCode(0x064A) + 'ة',
                    'ﺢﺳ' + String.fromCharCode(0x0627) + 'ن',
                    'ﻞ' + String.fromCharCode(0x062E) + 'ي',
                    'ﻁ' + String.fromCharCode(0x0631) + 'ق',
                    'د' + String.fromCharCode(0x0645) + 'ار'
                ];

                // base64 decoder
                const b64dec = `
local function ${varNames[1]}(d)
    local b='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/'
    local t={}
    for i=1,#d,4 do
        local a,b1,c1,d1=0,0,0,0
        local p1,p2,p3,p4=d:sub(i,i+3):byte(1,-1)
        if not p1 then break end
        a=(p1==61 and 0 or (string.find(b,string.char(p1))-1))
        b1=(p2==61 and 0 or (string.find(b,string.char(p2))-1))
        c1=(p3==61 and 0 or (string.find(b,string.char(p3))-1))
        d1=(p4==61 and 0 or (string.find(b,string.char(p4))-1))
        local n=a*262144+b1*4096+c1*64+d1
        t[#t+1]=string.char(math.floor(n/65536))
        if p3~=61 then t[#t+1]=string.char(math.floor((n%65536)/256)) end
        if p4~=61 then t[#t+1]=string.char(math.floor(n%256)) end
    end
    return table.concat(t)
end`;

                // XOR decrypt
                const xorDec = `
local function ${varNames[2]}(data, seed)
    local s=seed
    local r={}
    for i=1,#data do
        s=(s*1103515245+12345)%2147483647
        r[i]=string.char(string.byte(data,i)~(s%256))
    end
    return table.concat(r)
end`;

                // VM executor
                const vmExec = `
local function ${varNames[3]}(bc)
    local st={}
    local sp=0
    local ip=1
    while ip<=#bc do
        local op=bc[ip]
        ip=ip+1
        if op==1 then
            local val=bc[ip]
            ip=ip+1
            sp=sp+1
            st[sp]=string.char(val)
        elseif op==2 then
            local s=""
            for i=1,sp do s=s..st[i] end
            sp=1
            st[1]=s
        elseif op==3 then
            local f,err=loadstring(st[sp])
            sp=sp-1
            if f then pcall(f) end
        else
            -- تعليمات وهمية
            local _=bc[ip] ip=ip+1
        end
    end
end`;

                // بناء حلقات فك التشفير الستة
                let decryptSteps = '';
                for (let i = 0; i < 6; i++) {
                    const seed = seeds[i];
                    decryptSteps += `
    data = ${varNames[2]}(data, ${seed})
    data = ${varNames[1]}(data)  -- بعد كل XOR نفك base64 لنحصل على بايتات صافية للطبقة التالية
    `;
                }
                // الترتيب الصحيح: نحتاج البدء من base64 النهائي، ثم فك XOR ثم base64 decode? يجب الانتباه:
                // في التشفير قمنا بـ: bytes -> xor -> base64 -> (bytes للدورة التالية) -> xor -> base64 ...
                // إذن المحمل يستقبل base64 نهائي، يفك base64 -> bytes -> XOR decode -> يحصل على نص (قد يكون base64 سابق) -> يفك base64 مرة أخرى... وهكذا.
                // سأقوم بجعل كل طبقة تنتج base64 string يمثل الطبقة التالية.
                // لتسهيل الأمر: سأجعل عملية التشفير تنتج base64 string نهائي، وعملية فك التشفير بالعكس:
                // for i=6 down to 1: base64 decode -> xor decode -> output string (الذي هو base64 للطبقة الأعمق).
                // ولكن في التصميم الحالي للتشفير، كنت سأطبق: (xor ثم base64) لكل طبقة، بدءًا من bytecode الداخلي.
                // لذا فك التشفير: base64 decode -> xor decode = ينتج base64 string للطبقة السابقة... وهكذا حتى نصل إلى bytecode raw.
                // سأكتب الحلقات في المحمل بالعكس.

                let reverseSteps = '';
                for (let i = 5; i >= 0; i--) {
                    const seed = seeds[i];
                    reverseSteps += `
    data = ${varNames[1]}(data)   -- base64 decode
    data = ${varNames[2]}(data, ${seed})  -- xor decode
    `;
                }

                const finalLoader = `
local ${varNames[4]} = ${checksum}  -- المجموع الاختباري
${b64dec}
${xorDec}
${vmExec}
local data = "${encryptedFinal}"
${reverseSteps}
-- الآن data هو bytecode الخام كنص، نحوله إلى جدول أرقام
local bytecode = {}
for i=1, #data do
    bytecode[i] = string.byte(data, i)
end
-- التحقق من التلاعب
local sum = 0
for i=1, #bytecode do
    sum = sum + bytecode[i] * i
end
if sum ~= ${varNames[4]} then
    while true do end  -- تجميد في حلقة لا نهائية
end
${varNames[3]}(bytecode)
`;
                return finalLoader;
            }

            // ============ تنفيذ التشفير بست طبقات ============
            encryptBtn.addEventListener('click', () => {
                if (!selectedFile) return;

                statusMsg.textContent = '⏳ جاري التشفير بـ 6 طبقات VM...';
                encryptBtn.disabled = true;
                downloadBtn.disabled = true;

                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const original = e.target.result;
                        if (!original.trim()) throw new Error('الملف فارغ');

                        // بناء bytecode الداخلي
                        const bytecode = buildVMBytecode(original);
                        const checksum = bytecode.reduce((s, v, i) => s + v * (i + 1), 0);

                        // توليد 6 بذور من النص الأصلي
                        const seeds = [];
                        let baseHash = hashString(original);
                        for (let i = 0; i < 6; i++) {
                            seeds.push((baseHash + i * 7919 + 1) % 999999937 + 10000);
                        }

                        // تطبيق 6 طبقات تشفير
                        let currentBytes = bytecode.slice(); // نسخة
                        for (let layer = 0; layer < 6; layer++) {
                            const keystream = generateKeystream(seeds[layer], currentBytes.length);
                            currentBytes = xorBytes(currentBytes, keystream);
                            // تحويل إلى base64 string (يمثل مدخلات الطبقة التالية)
                            const b64 = base64Encode(currentBytes);
                            // تحويل b64 string إلى bytes للطبقة التالية (كتحضير)
                            currentBytes = [];
                            for (let j = 0; j < b64.length; j++) {
                                currentBytes.push(b64.charCodeAt(j));
                            }
                        }
                        // الناتج النهائي base64 string
                        const finalBase64 = base64Encode(currentBytes);

                        // توليد المحمل الأسطوري
                        const obfuscatedCode = generateObfuscatedLoader(finalBase64, seeds, checksum);

                        // عرض الناتج
                        encryptedCodeArea.value = obfuscatedCode;
                        outputPanel.style.display = 'block';
                        downloadBtn.disabled = false;
                        statusMsg.textContent = '✅ تم التشفير بـ 6 طبقات VM! لا يمكن فكه.';

                        downloadBtn.onclick = () => {
                            const blob = new Blob([obfuscatedCode], { type: 'text/plain' });
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = 'encrypted_lvl6.lua';
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                        };
                    } catch (err) {
                        statusMsg.textContent = '❌ خطأ: ' + err.message;
                        outputPanel.style.display = 'none';
                    } finally {
                        encryptBtn.disabled = false;
                    }
                };

                reader.onerror = () => {
                    statusMsg.textContent = '❌ فشل قراءة الملف';
                    encryptBtn.disabled = false;
                };

                reader.readAsText(selectedFile, 'UTF-8');
            });
        })();
    </script>
</body>
</html>
