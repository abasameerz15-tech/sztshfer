<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𝐴𝐵𝐵𝐴𝑆 | ŞZS </title>
    <style>
        /* منع النزول وحركة الخلفية */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; /* يمنع السحب والنزول */
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #000814;
            display: flex; justify-content: center; align-items: center;
        }

        /* الخلفية المائية المتحركة */
        body::before {
            content: "";
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #001219, #003049, #001d3d);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            z-index: -2;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* تأثير الثلج الصاعد */
        .snow-container {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; z-index: -1; pointer-events: none;
        }
        .snow {
            position: absolute; bottom: -20px;
            background: rgba(255, 255, 255, 0.4); border-radius: 50%;
            animation: rise 6s linear infinite;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
        }

        .rights {
            position: absolute; top: 15px; font-size: 18px;
            font-weight: bold; color: #00b4d8; text-shadow: 0 0 10px #00b4d8;
        }

        /* الكرت الرئيسي يشبه تصميم الصورة */
        .hub-card {
            background: rgba(0, 15, 25, 0.85);
            backdrop-filter: blur(20px);
            border: 2px solid #00b4d8;
            border-radius: 25px;
            padding: 30px;
            width: 85%; max-width: 380px;
            box-shadow: 0 0 30px rgba(0, 180, 216, 0.4);
            z-index: 10;
        }

        h1 { font-size: 20px; margin-bottom: 10px; color: #fff; text-transform: uppercase; }
        p { font-size: 14px; color: #caf0f8; margin-bottom: 25px; opacity: 0.8; }

        /* أزرار موحدة بالكامل */
        .btn {
            display: block; padding: 14px; margin: 12px 0;
            font-size: 15px; font-weight: bold; color: #fff;
            text-decoration: none; border-radius: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid #00b4d8; /* نفس اللون لكل الأزرار */
            transition: 0.3s ease;
            animation: pulse-border 2.5s infinite;
        }

        .btn:hover { background: rgba(0, 180, 216, 0.2); transform: scale(1.03); }

        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 5px rgba(0, 180, 216, 0.3); border-color: #00b4d8; }
            50% { box-shadow: 0 0 15px rgba(0, 180, 216, 0.6); border-color: #00f5d4; }
        }

        .label { font-size: 11px; margin-top: 20px; opacity: 0.5; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="snow-container" id="snowBox"></div>

    <div class="rights">𝐴𝐵𝐵𝐴𝑆 | ŞZS TIK TOK</div>

    <div class="hub-card">
        <h1>Leaks and Gifts Hub</h1>
        <p>Claim your rewards and connect with the developer</p>
        
        <a href="javascript:void(0)" class="btn" onclick="playEffect('https://link.brawlstars.com/voucher/e0793a51-1bc1-44ce-a7e0-1d72cef91b6d')">
           GET REWARD BOX
        </a>

        <div class="label">DEVELOPER CONTACT</div>
        
        <a href="javascript:void(0)" class="btn" onclick="playEffect('https://www.tiktok.com/@sz2st?_r=1&_t=ZS-952okvechm5')">
           DEVELOPER TIKTOK
        </a>

        <a href="javascript:void(0)" class="btn" onclick="playEffect('https://t.me/DEVSZ_STORE')">
           DEVELOPER TELEGRAM
        </a>
    </div>

    <audio id="audioClick" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        // إنشاء تأثير الثلج
        const snowBox = document.getElementById('snowBox');
        for (let i = 0; i < 30; i++) {
            let snow = document.createElement('div');
            snow.className = 'snow';
            let size = Math.random() * 4 + 2 + 'px';
            snow.style.width = size;
            snow.style.height = size;
            snow.style.left = Math.random() * 100 + '%';
            snow.style.animationDelay = Math.random() * 5 + 's';
            snowBox.appendChild(snow);
        }

        function playEffect(url) {
            var sound = document.getElementById("audioClick");
            sound.currentTime = 0;
            sound.play();
            setTimeout(() => { window.location.href = url; }, 400);
        }
    </script>
</body>
</html>
