<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaks and Gifts Website</title>
    <style>
        /* تصميم الخلفية والخطوط */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #001d3d 0%, #000814 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            text-align: center;
        }

        /* كارت المحتوى الزجاجي */
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 90%;
            width: 500px;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00b4d8;
        }

        p {
            font-size: 18px;
            color: #caf0f8;
            margin-bottom: 30px;
        }

        /* الزر الاحترافي */
        .btn-get {
            display: inline-block;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
            background: rgba(0, 180, 216, 0.2);
            border: 2px solid #00b4d8;
            border-radius: 50px;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 180, 216, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-get:hover {
            background: #00b4d8;
            box-shadow: 0 0 30px #00b4d8;
            transform: translateY(-3px);
        }

        .btn-get:active {
            transform: translateY(1px);
        }

        /* أنيميشن الدخول */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* لمسة احترافية خلف الزر */
        .glow {
            position: absolute;
            width: 100px;
            height: 100px;
            background: #00b4d8;
            filter: blur(100px);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <h1>مرحبًا بك في موقع التسريبات والهدايا</h1>
        <h1>Welcome to the leaks and gifts website</h1>
        <hr style="opacity: 0.2; margin: 20px 0;">
        <p>اضغط الزر أدناه للحصول على صندوق ناجية</p>
        <p>Press the button below to get a nigeeh box</p>

        <a href="https://link.brawlstars.com/voucher/e0793a51-1bc1-44ce-a7e0-1d72cef91b6d" 
           class="btn-get" 
           onclick="playSound()">
           الحصول على الصندوق get box
        </a>
    </div>

    <audio id="clickSound">
        <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
    </audio>

    <script>
        function playSound() {
            var audio = document.getElementById("clickSound");
            audio.play();
            // تأخير الفتح قليلاً عشان الصوت ينسمع
            setTimeout(function() {
                window.location.href = "https://link.brawlstars.com/voucher/e0793a51-1bc1-44ce-a7e0-1d72cef91b6d";
            }, 200);
        }
    </script>

</body>
</html>
