<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع اللغة العراقية</title>
    <style>
        /* إعدادات الألوان والخلفية */
        :root {
            --bg-color: #050505;
            --main-purple: #8a2be2;
            --main-blue: #007bff;
            --text-white: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(138, 43, 226, 0.15), transparent),
                radial-gradient(circle at 80% 70%, rgba(0, 123, 255, 0.15), transparent);
            color: var(--text-white);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #bbb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .rights {
            font-size: 16px;
            margin-bottom: 25px;
            color: #ccc;
        }

        .rights a {
            color: var(--main-blue);
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            border-bottom: 1px solid transparent;
        }

        .rights a:hover {
            color: var(--main-purple);
            border-bottom: 1px solid var(--main-purple);
        }

        .instruction {
            font-size: 15px;
            margin-top: 30px;
            margin-bottom: 15px;
            color: #aaa;
        }

        /* تنسيق الزر الرئيسي */
        .lang-btn {
            display: inline-block;
            background: linear-gradient(45deg, var(--main-purple), var(--main-blue));
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
            transition: 0.4s;
            width: 80%;
        }

        .lang-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 123, 255, 0.5);
            filter: brightness(1.1);
        }

        .lang-btn:active {
            transform: scale(0.95);
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>مرحبٱ بك في موقع اللغة العراقية</h1>
        
        <p class="rights">
            حقوق عباس: <a href="https://t.me/abbasiraqsz" target="_blank">اضغط هنا</a>
        </p>

        <p class="instruction">لأختيار اللغة اضغط الزر إدناه.</p>

        <a href="https://t.me/setlanguage/abbasiraqsz" class="lang-btn">اضغط لأختيار اللغة</a>
    </div>

</body>
</html>
