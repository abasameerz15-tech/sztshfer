<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع اللهجة العراقية</title>
    <!-- استدعاء خطوط وأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* إعدادات الخلفية المتحركة (أحمر وأزرق) */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(45deg, #8b0000, #00008b, #ff0000, #0000ff);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* تأثير النجوم الصاعدة */
        .star {
            position: absolute;
            bottom: -10px;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: rise 5s linear infinite;
        }

        @keyframes rise {
            from { transform: translateY(0); opacity: 0.5; }
            to { transform: translateY(-110vh); opacity: 0; }
        }

        /* الحاوية الرئيسية */
        .container {
            text-align: center;
            z-index: 10;
            background: rgba(0, 0, 0, 0.4);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        /* تصميم الأزرار */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 2px solid transparent;
        }

        /* زر استخدام اللهجة */
        .btn-use {
            background: #ffffff;
            color: #000;
        }
        .btn-use:hover {
            background: transparent;
            color: #fff;
            border-color: #fff;
        }

        /* زر تليجرام */
        .btn-tg {
            background: #229ED9;
        }
        .btn-tg:hover {
            background: #1c8adb;
            transform: scale(1.05);
        }

        /* زر تيك توك */
        .btn-tt {
            background: #000000;
            border: 1px solid #444;
        }
        .btn-tt:hover {
            background: #222;
            transform: scale(1.05);
        }

        /* توقيع المطور */
        .dev-name {
            color: #ffda44;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- حاوية النجوم (يتم توليدها بالجافاسكريبت لسهولة التحكم) -->
    <div id="stars-container"></div>

    <div class="container">
        <h1>مرحباً بك في موقع اللهجة العراقية</h1>
        <p>الموقع بالكامل تحت التطوير على يد <span class="dev-name">𝐴𝐵𝐵𝐴𝑆</span></p>

        <div class="btn-container">
            <a href="https://t.me/setlanguage/abbasiraqsz" class="btn btn-use" target="_blank">
                <i class="fas fa-language"></i> استخدام اللهجة
            </a>

            <a href="https://t.me/DEVSZ_STORE" class="btn btn-tg" target="_blank">
                <i class="fab fa-telegram"></i> حساب المطور على تيليجرام
            </a>

            <a href="https://www.tiktok.com/@sz2st?_r=1&_t=ZS-96M8EAZjRRJ" class="btn btn-tt" target="_blank">
                <i class="fab fa-tiktok"></i> حساب المطور على تيك توك
            </a>
        </div>
    </div>

    <script>
        // وظيفة إنشاء النجوم بشكل عشوائي
        function createStars() {
            const container = document.getElementById('stars-container');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // حجم عشوائي
                const size = Math.random() * 4 + 'px';
                star.style.width = size;
                star.style.height = size;
                
                // موقع عشوائي
                star.style.left = Math.random() * 100 + 'vw';
                
                // توقيت عشوائي للبداية والسرعة
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                star.style.animationDelay = Math.random() * 5 + 's';
                
                container.appendChild(star);
            }
        }
        createStars();
    </script>
</body>
</html>
