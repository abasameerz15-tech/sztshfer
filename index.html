<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة السكربتات 📜</title>
    <style>
        /* إعدادات الخلفية والألوان الاحترافية */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a0b2e 0%, #090514 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* كود النجوم المتحركة المتصاعدة */
        .star-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: rise linear infinite;
            opacity: 0.8;
            box-shadow: 0 0 10px #fff, 0 0 20px #8a2be2;
        }

        @keyframes rise {
            0% {
                transform: translateY(105vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-5vh) scale(1);
                opacity: 0;
            }
        }

        /* حاوية المحتوى الرئيسي */
        .container {
            background: rgba(20, 12, 38, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(138, 43, 226, 0.4);
            border-radius: 24px;
            padding: 35px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7), 0 0 30px rgba(138, 43, 226, 0.2);
            z-index: 10;
            position: relative;
            transform: translateY(0);
            transition: all 0.3s ease;
        }

        .container:hover {
            border-color: rgba(138, 43, 226, 0.8);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 40px rgba(138, 43, 226, 0.4);
        }

        /* العناوين والنصوص */
        h1 {
            font-size: 26px;
            background: linear-gradient(45deg, #ff007f, #8a2be2, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            font-weight: 800;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.3);
        }

        .subtitle {
            font-size: 19px;
            color: #e0d5ff;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* زر النسخ الاحترافي بتأثير الغلو */
        .btn-copy {
            background: linear-gradient(135deg, #8a2be2 0%, #4b0082 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.4);
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 25px;
            outline: none;
            letter-spacing: 0.5px;
        }

        .btn-copy:hover {
            background: linear-gradient(135deg, #a142ff 0%, #5c00a3 100%);
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.8);
            transform: translateY(-2px);
        }

        .btn-copy:active {
            transform: translateY(1px);
            box-shadow: 0 2px 8px rgba(138, 43, 226, 0.6);
        }

        /* رسالة تأكيد النسخ الناجح */
        .toast {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff88;
            color: #000;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(0,255,136,0.5);
        }

        .toast.show {
            bottom: 20px;
            opacity: 1;
        }

        /* تصميم الصورة بشكل احترافي */
        .script-img {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .script-img:hover {
            transform: scale(1.03);
            border-color: rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <!-- حاوية النجوم المتحركة -->
    <div class="star-container" id="starContainer"></div>

    <!-- كرت القائمة الرئيسي -->
    <div class="container" onclick="playClickSound()">
        <h1>مرحبٱ بك في قائمة السكربتات 📜</h1>
        
        <p class="subtitle">سكربت ماب الكيبورد👇🏻</p>
        
        <!-- زر النسخ -->
        <button class="btn-copy" onclick="copyScript(event)">نسخ السكربت</button>
        
        <!-- الصورة -->
        <img src="https://raw.githubusercontent.com/abasameerz15-tech/sztshfer/refs/heads/main/1780921910535.png" alt="Script Image" class="script-img">
        
        <!-- إشعار تم النسخ -->
        <div class="toast" id="toast">تم النسخ بنجاح! ✅</div>
    </div>

    <script>
        // السكربت المطلوب نسخة
        const scriptText = `loadstring(game:HttpGet("https://raw.githubusercontent.com/abasameerz15-tech/sz/refs/heads/main/keyboard.lua.txt"))();`;

        // إنشاء صوت الـ Click هندسياً بدون روابط خارجية متعطلة
        function playClickSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sine'; // صوت ناعم ونقي
                osc.frequency.setValueAtTime(600, ctx.currentTime); // تردد مناسب للنقرة
                osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.08);
                
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + 0.08);
            } catch (e) {
                console.log("Audio not allowed yet");
            }
        }

        // وظيفة نسخ السكربت وتأثير التنبيه
        function copyScript(event) {
            event.stopPropagation(); // منع تكرار الصوت من الكانتينر الخارجي
            playClickSound();

            navigator.clipboard.writeText(scriptText).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }).catch(err => {
                // طريقة احتياطية في حال المتصفحات القديمة
                const el = document.createElement('textarea');
                el.value = scriptText;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            });
        }

        // توليد النجوم العشوائية وتوجيه حركتها للأعلى
        const starContainer = document.getElementById('starContainer');
        const starCount = 60; // عدد النجوم في الشاشة

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            
            // تخصيص أحجام ومواقع عشوائية
            const size = Math.random() * 3 + 1; // بين 1px و 4px
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            
            star.style.left = `${Math.random() * 100}%`;
            
            // سرعات حركة مختلفة لتأثير الـ 3D (Parallax)
            const duration = Math.random() * 4 + 3; // بين 3 إلى 7 ثواني
            star.style.animationDuration = `${duration}s`;
            
            // توقيت بدء مختلف حتى لا تظهر كلها معاً في البداية
            star.style.animationDelay = `${Math.random() * 5}s`;
            
            starContainer.appendChild(star);
        }
    </script>
</body>
</html>
