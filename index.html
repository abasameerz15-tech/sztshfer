<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحديث دلتا - الإصدار الأخير</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        .main-card {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            padding: 20px;
        }

        .logo-container {
            position: relative;
            margin-bottom: 30px;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(0, 123, 255, 0.5);
            border: 2px solid #007bff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 123, 255, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(0, 123, 255, 0.7); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 123, 255, 0.4); }
        }

        h1 { font-size: 28px; margin-bottom: 10px; letter-spacing: 1px; color: #fff; }
        .version { background: #007bff; padding: 5px 15px; border-radius: 50px; font-size: 14px; margin-bottom: 20px; display: inline-block; }
        
        .info-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            width: 90%;
            max-width: 350px;
        }

        .info-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; color: #ccc; }
        .info-item span:last-child { color: #007bff; font-weight: bold; }

        .download-btn {
            width: 90%;
            max-width: 300px;
            background: linear-gradient(45deg, #007bff, #00c6ff);
            color: white;
            padding: 18px;
            text-decoration: none;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0, 123, 255, 0.3);
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .download-btn:active { transform: scale(0.95); }

        footer { position: absolute; bottom: 20px; color: #555; font-size: 12px; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="logo-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon.svg" class="logo" alt="Delta Logo">
    </div>

    <h1>هاك دلتا - DELTA</h1>
    <div class="version">إصدار V2.647 الأخير</div>

    <div class="info-box">
        <div class="info-item"><span>الحالة:</span><span>يعمل بنجاح ✅</span></div>
        <div class="info-item"><span>الحجم:</span><span>118.63 MB</span></div>
        <div class="info-item"><span>التوافق:</span><span>Android 8+</span></div>
    </div>

    <a href="https://www.mediafire.com/file/iq1uyr0g7q8qo2v/base.apk/file" id="downloadLink" class="download-btn">تثبيت الآن</a>

    <footer>جميع الحقوق محفوظة © 2026</footer>
</div>

<script>
    // خدعة لبدء التحميل تلقائياً بعد ثانيتين من دخول الصفحة
    window.onload = function() {
        setTimeout(function() {
            // تفعيل الرابط تلقائياً
            // window.location.href = document.getElementById('downloadLink').href;
        }, 2000);
    };
</script>

</body>
</html>
