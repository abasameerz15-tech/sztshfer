<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد هاي داي</title>
    <style>
        :root {
            --primary-bg: #0a0a0a;
            --accent-purple: #8a2be2;
            --accent-blue: #007bff;
            --text-color: #ffffff;
            --card-bg: #1a1a1a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.3);
            border: 1px solid var(--accent-purple);
        }

        h1 { color: var(--accent-blue); margin-bottom: 5px; }
        .blessing { color: #ffeb3b; font-size: 1.1rem; margin-bottom: 20px; }

        .btn {
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-blue));
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .btn:hover { transform: scale(1.02); opacity: 0.9; }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #444;
            background: #222;
            color: white;
            text-align: center;
        }

        .result-box {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: right;
            display: none; /* مخفي حتى يتم الحساب */
        }

        .result-item { margin: 8px 0; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .label { font-weight: bold; color: var(--accent-blue); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="main-page" class="container">
        <h1>نورت موقع مساعد هاي داي</h1>
        <p class="blessing">اللهم صّلِ على محمد وآل محمد 🌺</p>
        <button class="btn" onclick="showCalculator()">حاسبة الحصاد</button>
    </div>

    <div id="calc-page" class="container hidden">
        <h1>حاسبة الحصاد</h1>
        <p class="blessing">صّلِ على محمد وآل محمد 🌺</p>

        <label>عدد الأشجار:</label>
        <input type="number" id="tree-count" placeholder="أدخل عدد الأشجار هنا..." oninput="calculate()">

        <label>نوع الفاكهة:</label>
        <select id="fruit-type" onchange="calculate()">
            <option value="none">اختر الفاكهة...</option>
            <option value="peach">خوخ</option>
            <option value="apple">تفاح</option>
            <option value="banana">موز</option>
            <option value="cherry">كرز</option>
            <option value="cacao">كاكاو</option>
            <option value="coconut">جوز الهند</option>
            <option value="lemon">ليمون</option>
            <option value="orange">برتقال</option>
            <option value="pomegranate">رمان</option>
        </select>

        <div id="results" class="result-box">
            <div class="result-item"><span class="label">تكلفة الأشجار:</span> <span id="res-cost">0</span> عملة</div>
            <div class="result-item"><span class="label">إجمالي النقود بعد البيع:</span> <span id="res-sale">0</span> عملة</div>
            <hr>
            <div class="result-item"><span class="label">إجمالي الخبرة:</span> <span id="res-total-xp">0</span> خبرة</div>
            <div class="result-item"><span class="label">كمية الفاكهة الكلية:</span> <span id="res-total-fruit">0</span> حبة</div>
            <hr>
            <div class="result-item"><span class="label">خبرة الإحياء:</span> <span id="res-revive-xp">0</span> مساعدة</div>
            <div class="result-item"><span class="label">عدد المناشير المطلوبة:</span> <span id="res-saws">0</span> منشار</div>
        </div>

        <button class="btn" style="background: #444;" onclick="showMain()">العودة للرئيسية</button>
    </div>

    <script>
        // بيانات تقريبية لأسعار هاي داي (يمكنك تعديل الأرقام بدقة من اللعبة)
        const fruitData = {
            apple: { cost: 160, sell: 39, xp: [7, 8, 9, 9], fruit: [2, 3, 4, 4] },
            cherry: { cost: 410, sell: 68, xp: [13, 15, 17, 17], fruit: [2, 3, 4, 4] },
            cacao: { cost: 550, sell: 86, xp: [16, 18, 20, 20], fruit: [2, 3, 4, 4] },
            peach: { cost: 650, sell: 110, xp: [20, 22, 25, 25], fruit: [2, 3, 4, 4] },
            // أضفت بعضها كمثال، يمكنك إضافة البقية بنفس النمط
        };

        function showCalculator() {
            document.getElementById('main-page').classList.add('hidden');
            document.getElementById('calc-page').classList.remove('hidden');
        }

        function showMain() {
            document.getElementById('calc-page').classList.add('hidden');
            document.getElementById('main-page').classList.remove('hidden');
        }

        function calculate() {
            const count = parseInt(document.getElementById('tree-count').value) || 0;
            const type = document.getElementById('fruit-type').value;
            const resultsDiv = document.getElementById('results');

            if (type === "none" || count <= 0) {
                resultsDiv.style.display = "none";
                return;
            }

            resultsDiv.style.display = "block";
            const data = fruitData[type] || { cost: 500, sell: 100, xp: [10, 15, 20, 20], fruit: [2, 3, 4, 4] };

            // حسابات
            const totalFruit = count * (data.fruit.reduce((a, b) => a + b, 0));
            const totalCost = count * data.cost;
            const totalSale = totalFruit * data.sell;
            const totalXP = count * (data.xp.reduce((a, b) => a + b, 0));
            const reviveXP = count * 16; // معدل خبرة الإحياء

            // عرض النتائج
            document.getElementById('res-cost').innerText = totalCost.toLocaleString();
            document.getElementById('res-sale').innerText = totalSale.toLocaleString();
            document.getElementById('res-total-xp').innerText = totalXP.toLocaleString();
            document.getElementById('res-total-fruit').innerText = totalFruit.toLocaleString();
            document.getElementById('res-revive-xp').innerText = (count * 10).toLocaleString();
            document.getElementById('res-saws').innerText = count.toLocaleString();
        }
    </script>
</body>
</html>
