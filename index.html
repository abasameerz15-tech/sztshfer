<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delta Hub - التحميل التلقائي</title>
    <style>
        :root { --primary: #00d2ff; --accent: #007bff; --bg: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body {
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .main-container {
            text-align: center;
            width: 100%;
            padding: 20px;
        }

        .loader-circle {
            width: 120px;
            height: 120px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            margin: 0 auto 30px;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        h1 { font-size: 28px; margin-bottom: 10px; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        p { color: #888; font-size: 16px; margin-bottom: 40px; }

        .status-box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            display: inline-block;
            min-width: 250px;
        }

        .status-text { color: var(--primary); font-weight: bold; }

        /* زر احتياطي في حال لم يبدأ التحميل تلقائياً */
        .manual-btn {
            margin-top: 30px;
            display: block;
            color: #555;
            text-decoration: underline;
            font-size: 13px;
            background: none;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="loader-circle"></div>
    <h1>جاري تجهيز ملف التثبيت</h1>
    <p>يرجى عدم إغلاق الصفحة، سيبدأ التحميل الآن...</p>

    <div class="status-box">
        <span class="status-text" id="status">جاري الاتصال بالسيرفر...</span>
    </div>

    <a href="https://files.catbox.moe/28ne2w.apk" id="downloadLink" style="display:none;"></a>
    
    <button class="manual-btn" onclick="startDownload()">إذا لم يبدأ التحميل تلقائياً اضغط هنا</button>
</div>

<script>
    function startDownload() {
        const link = document.getElementById('downloadLink');
        link.click();
        document.getElementById('status').innerText = "بدأ التحميل بنجاح ✅";
        document.getElementById('status').style.color = "#00ff88";
    }

    // بدء التحميل تلقائياً بعد ثانية واحدة من فتح الصفحة
    window.onload = function() {
        setTimeout(startDownload, 1500);
    };
</script>

</body>
</html>
