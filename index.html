<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>موقع اللغة العراقية</title>
    <style>
        :root {
            --main-purple: #8a2be2;
            --main-blue: #007bff;
            --text-white: #ffffff;
        }

        /* قفل الشاشة ومنع التحريك */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* يمنع النزول والصعود */
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* يمنع تحريك الشاشة باللمس */
        }

        /* خلفية النجوم المتحركة */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: moveUp linear infinite;
        }

        @keyframes moveUp {
            from { transform: translateY(100vh); }
            to { transform: translateY(-10vh); }
        }

        /* التنبيه الأحمر المتحرك */
        .alert-text {
            position: absolute;
            top: 10%;
            color: #ff3e3e;
            font-weight: bold;
            font-size: 20px;
            z-index: 10;
            animation: floatUpDown 2s ease-in-out infinite;
        }

        @keyframes floatUpDown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* المحتوى الرئيسي */
        .container {
            position: relative;
            z-index: 5;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.2);
            width: 85%;
            max-width: 400px;
        }

        h1 { font-size: 24px; margin-bottom: 20px; color: #fff; }

        .rights a {
            color: var(--main-blue);
            text-decoration: none;
            font-weight: bold;
            background: rgba(0, 123, 255, 0.1);
            padding: 5px 10px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .rights a:hover { background: var(--main-purple); color: #fff; }

        .lang-btn {
            display: inline-block;
            margin-top: 25px;
            background: linear-gradient(45deg, var(--main-purple), var(--main-blue));
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 12px;
            width: 80%;
            transition: 0.3s;
        }

        .lang-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>

    <div class="alert-text">⚠️ قيد التطوير!</div>

    <div class="container">
        <h1>مرحبٱ بك في موقع اللغة العراقية</h1>
        
        <p style="color: #ccc;">
            حقوق عباس: <a href="https://t.me/DEVSZ_STORE" class="sound-link">اضغط هنا</a>
        </p>

        <p style="color: #999; margin-top: 30px; font-size: 14px;">لأختيار اللغة اضغط الزر إدناه.</p>

        <a href="https://t.me/setlanguage/abbasiraqsz" class="lang-btn sound-link">اضغط لأختيار اللغة</a>
    </div>

    <audio id="click-sound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>

    <script>
        // إنشاء النجوم برمجياً
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDuration = Math.random() * 3 + 2 + 's';
            star.style.animationDelay = Math.random() * 5 + 's';
            starsContainer.appendChild(star);
        }

        // تشغيل صوت الضغطة
        const clickSound = document.getElementById('click-sound');
        document.querySelectorAll('.sound-link').forEach(button => {
            button.addEventListener('click', (e) => {
                clickSound.currentTime = 0;
                clickSound.play();
                // تأخير بسيط للانتقال لكي يسمع المستخدم الصوت
                const href = button.getAttribute('href');
                if(href && !href.startsWith('#')) {
                    e.preventDefault();
                    setTimeout(() => { window.location.href = href; }, 200);
                }
            });
        });
    </script>
</body>
</html>
